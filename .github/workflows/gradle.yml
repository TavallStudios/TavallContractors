name: Gradle

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
      - uses: actions/setup-node@v4
        with:
          node-version: "20.18.0"
          cache: npm
          cache-dependency-path: spring-webview/package-lock.json
      - uses: gradle/actions/setup-gradle@v4
      - run: >-
          ./gradlew --no-daemon clean check
          :spring-webview:integrationTest
          publishToMavenLocal stageDistribution
